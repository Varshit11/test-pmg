<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gati Shakti - Project Issue Summarizer</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const API_BASE_URL = 'http://localhost:8000';

        // Error Banner Component
        function ErrorBanner({ message, onClose }) {
            if (!message) return null;
            
            return (
                <div className="error-banner bg-red-50 border-l-4 border-red-400 p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center">
                            <i className="fas fa-exclamation-triangle text-red-400 mr-3"></i>
                            <div>
                                <h3 className="text-sm font-medium text-red-800">Issue with AI Service</h3>
                                <p className="text-sm text-red-700 mt-1">{message}</p>
                            </div>
                        </div>
                        <button
                            onClick={onClose}
                            className="text-red-400 hover:text-red-600"
                        >
                            <i className="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            );
        }

        // File upload component
        function FileUpload({ onFileUpload, isLoading }) {
            const [isDragOver, setIsDragOver] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragOver(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragOver(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragOver(false);
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                }
            };

            const handleFileSelect = (file) => {
                if (file && file.type === 'application/json') {
                    setSelectedFile(file);
                } else {
                    alert('Please select a valid JSON file');
                }
            };

            const handleUpload = () => {
                if (selectedFile) {
                    onFileUpload(selectedFile);
                }
            };

            return (
                <div className="bg-white rounded-lg shadow-sm p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i className="fas fa-upload mr-2 text-blue-500"></i>
                        Bulk JSON Upload
                    </h3>
                    
                    <div
                        className={`file-drop-zone rounded-lg p-8 text-center ${isDragOver ? 'drag-over' : ''}`}
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                    >
                        <i className="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                        <p className="text-gray-600 mb-2">Drop your JSON file here</p>
                        <p className="text-sm text-gray-500 mb-4">or click to select a file</p>
                        
                        <input
                            type="file"
                            accept=".json"
                            onChange={(e) => handleFileSelect(e.target.files[0])}
                            className="hidden"
                            id="file-input"
                        />
                        <label
                            htmlFor="file-input"
                            className="inline-block bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors"
                        >
                            Choose File
                        </label>
                    </div>

                    {selectedFile && (
                        <div className="mt-4 p-4 bg-gray-50 rounded-lg">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center">
                                    <i className="fas fa-file-code text-blue-500 mr-2"></i>
                                    <span className="text-sm text-gray-700">{selectedFile.name}</span>
                                    <span className="text-xs text-gray-500 ml-2">
                                        ({(selectedFile.size / 1024).toFixed(1)} KB)
                                    </span>
                                </div>
                                <button
                                    onClick={() => setSelectedFile(null)}
                                    className="text-red-500 hover:text-red-700"
                                >
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    <button
                        onClick={handleUpload}
                        disabled={!selectedFile || isLoading}
                        className="w-full mt-4 bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white py-2 px-4 rounded-lg font-medium transition-colors flex items-center justify-center"
                    >
                        {isLoading ? (
                            <>
                                <div className="loading-spinner mr-2"></div>
                                Processing...
                            </>
                        ) : (
                            <>
                                <i className="fas fa-cogs mr-2"></i>
                                Process JSON File
                            </>
                        )}
                    </button>
                </div>
            );
        }

        // Manual input component
        function ManualInput({ onSubmit, isLoading }) {
            const [formData, setFormData] = useState({
                project_id: '',
                project_name: '',
                issue_description: '',
                latest_comments: '',
                meeting_minutes: '',
                responsible_authority: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.project_id || !formData.issue_description) {
                    alert('Please fill in at least Project ID and Issue Description');
                    return;
                }
                onSubmit(formData);
            };

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            return (
                <div className="bg-white rounded-lg shadow-sm p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i className="fas fa-edit mr-2 text-green-500"></i>
                        Manual Entry
                    </h3>
                    
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    Project ID *
                                </label>
                                <input
                                    type="text"
                                    value={formData.project_id}
                                    onChange={(e) => handleChange('project_id', e.target.value)}
                                    placeholder="Enter project ID"
                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    Project Name
                                </label>
                                <input
                                    type="text"
                                    value={formData.project_name}
                                    onChange={(e) => handleChange('project_name', e.target.value)}
                                    placeholder="Enter project name"
                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                />
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Issue Description *
                            </label>
                            <textarea
                                value={formData.issue_description}
                                onChange={(e) => handleChange('issue_description', e.target.value)}
                                placeholder="Describe the issue..."
                                rows="4"
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none"
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Latest Comments
                            </label>
                            <textarea
                                value={formData.latest_comments}
                                onChange={(e) => handleChange('latest_comments', e.target.value)}
                                placeholder="Enter latest comments..."
                                rows="3"
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none"
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Meeting Minutes
                            </label>
                            <textarea
                                value={formData.meeting_minutes}
                                onChange={(e) => handleChange('meeting_minutes', e.target.value)}
                                placeholder="Enter meeting minutes..."
                                rows="3"
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none"
                            />
                        </div>

                        <button
                            type="submit"
                            disabled={isLoading}
                            className="w-full bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white py-2 px-4 rounded-lg font-medium transition-colors flex items-center justify-center"
                        >
                            {isLoading ? (
                                <>
                                    <div className="loading-spinner mr-2"></div>
                                    Generating Summary...
                                </>
                            ) : (
                                <>
                                    <i className="fas fa-magic mr-2"></i>
                                    Generate Summary
                                </>
                            )}
                        </button>
                    </form>
                </div>
            );
        }

        // Results display component
        function ResultsDisplay({ results, onClear }) {
            if (!results) return null;

            const getClassificationColor = (classification) => {
                const colors = {
                    'LAND & ACQUISITION ISSUES': 'bg-red-100 text-red-800',
                    'REGULATORY APPROVALS & PERMISSIONS': 'bg-yellow-100 text-yellow-800',
                    'UTILITY & INFRASTRUCTURE COORDINATION': 'bg-blue-100 text-blue-800',
                    'ROADS & CONNECTIVITY': 'bg-green-100 text-green-800',
                    'CONSTRUCTION & EXECUTION DELAYS': 'bg-purple-100 text-purple-800',
                    'FINANCIAL & DISBURSEMENT': 'bg-indigo-100 text-indigo-800',
                    'ENVIRONMENTAL & COMPLIANCE': 'bg-teal-100 text-teal-800',
                    'STAKEHOLDER COORDINATION': 'bg-orange-100 text-orange-800'
                };
                return colors[classification] || 'bg-gray-100 text-gray-800';
            };

            const handleExport = () => {
                const exportData = {
                    timestamp: results.timestamp,
                    processing_time: results.processing_time,
                    short_summary: results.short_summary,
                    detailed_summary: results.detailed_summary,
                    issue_classification: results.issue_classification
                };
                
                navigator.clipboard.writeText(JSON.stringify(exportData, null, 2))
                    .then(() => alert('Results copied to clipboard!'))
                    .catch(() => alert('Failed to copy to clipboard'));
            };

            return (
                <div className="bg-white rounded-lg shadow-sm p-6">
                    <div className="flex items-center justify-between mb-6">
                        <h3 className="text-lg font-semibold text-gray-900 flex items-center">
                            <i className="fas fa-chart-line mr-2 text-purple-500"></i>
                            Generated Summaries
                        </h3>
                        <div className="flex items-center space-x-2">
                            <button
                                onClick={handleExport}
                                className="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm flex items-center transition-colors"
                            >
                                <i className="fas fa-download mr-1"></i>
                                Export
                            </button>
                            <button
                                onClick={onClear}
                                className="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm flex items-center transition-colors"
                            >
                                <i className="fas fa-trash mr-1"></i>
                                Clear
                            </button>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {/* Short Summary */}
                        <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                            <div className="flex items-center mb-3">
                                <i className="fas fa-file-alt text-blue-500 mr-2"></i>
                                <h4 className="font-semibold text-gray-900">Short Summary</h4>
                                <span className="ml-2 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">2-3 line overview</span>
                            </div>
                            <p className="text-gray-700 leading-relaxed">{results.short_summary}</p>
                        </div>

                        {/* Detailed Summary */}
                        <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                            <div className="flex items-center mb-3">
                                <i className="fas fa-file-text text-green-500 mr-2"></i>
                                <h4 className="font-semibold text-gray-900">Detailed Summary</h4>
                                <span className="ml-2 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">Comprehensive overview</span>
                            </div>
                            <p className="text-gray-700 leading-relaxed">{results.detailed_summary}</p>
                        </div>

                        {/* Issue Classification */}
                        <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                            <div className="flex items-center mb-3">
                                <i className="fas fa-tags text-purple-500 mr-2"></i>
                                <h4 className="font-semibold text-gray-900">Project Issue Classification</h4>
                            </div>
                            <div className="flex items-center justify-between">
                                <span className={`px-3 py-1 rounded-full text-sm font-medium ${getClassificationColor(results.issue_classification)}`}>
                                    {results.issue_classification}
                                </span>
                                <div className="text-sm text-gray-500 flex items-center">
                                    <i className="fas fa-clock mr-1"></i>
                                    Processed in {results.processing_time?.toFixed(2)}s
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App component
        function App() {
            const [results, setResults] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState('');

            const handleApiError = (error) => {
                let userFriendlyMessage = '';
                
                if (error.message.includes('AI service is not working') || 
                    error.message.includes('API is not responding') ||
                    error.message.includes('Unable to connect to AI service') ||
                    error.message.includes('AI service is temporarily unavailable') ||
                    error.message.includes('AI service authentication failed') ||
                    error.message.includes('AI service is busy') ||
                    error.message.includes('Invalid response from AI service')) {
                    userFriendlyMessage = error.message;
                } else if (error.message.includes('fetch') || error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                    userFriendlyMessage = 'Unable to connect to the backend server. Please make sure the backend is running on http://localhost:8000';
                } else {
                    userFriendlyMessage = 'AI service is not working. Please try again later.';
                }
                
                setErrorMessage(userFriendlyMessage);
                setTimeout(() => setErrorMessage(''), 15000);
            };

            const handleFileUpload = async (file) => {
                setIsLoading(true);
                setErrorMessage('');
                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`${API_BASE_URL}/process-json`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || 'Processing failed');
                    }

                    const result = await response.json();
                    setResults(result);
                } catch (error) {
                    console.error('File upload error:', error);
                    handleApiError(error);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleManualSubmit = async (formData) => {
                setIsLoading(true);
                setErrorMessage('');
                try {
                    const response = await fetch(`${API_BASE_URL}/process-manual`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || 'Processing failed');
                    }

                    const result = await response.json();
                    setResults(result);
                } catch (error) {
                    console.error('Manual submit error:', error);
                    handleApiError(error);
                } finally {
                    setIsLoading(false);
                }
            };

            const clearResults = () => {
                setResults(null);
            };

            const clearError = () => {
                setErrorMessage('');
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="gradient-bg text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center">
                                    <i className="fas fa-project-diagram text-2xl mr-3"></i>
                                    <div>
                                        <h1 className="text-2xl font-bold">Gati Shakti</h1>
                                        <p className="text-blue-100">Project Issue Summarizer</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <div className="text-right">
                                        <p className="text-sm opacity-90">Last Updated</p>
                                        <p className="text-lg font-semibold">{new Date().toLocaleDateString()}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Error Banner */}
                        <ErrorBanner message={errorMessage} onClose={clearError} />

                        {/* Input Methods */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <FileUpload onFileUpload={handleFileUpload} isLoading={isLoading} />
                            <ManualInput onSubmit={handleManualSubmit} isLoading={isLoading} />
                        </div>

                        {/* Results */}
                        {results && (
                            <ResultsDisplay results={results} onClear={clearResults} />
                        )}

                        {/* Footer */}
                        <footer className="mt-12 text-center text-gray-500 text-sm">
                            <p>© 2025 Gati Shakti Project Issue Summarizer. Powered by IndiaAI.</p>
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html> -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gati Shakti - Enhanced Project Issue Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .file-drop-zone {
            border: 2px dashed #e5e7eb;
            transition: all 0.3s ease;
        }
        .file-drop-zone:hover {
            border-color: #3b82f6;
            background-color: #f8faff;
        }
        .file-drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #dbeafe;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: transform 0.2s ease-in-out;
        }
        .card-hover:hover {
            transform: translateY(-2px);
        }
        .loading-spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-banner {
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .similarity-badge {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .similarity-progress {
            height: 4px;
            border-radius: 2px;
            background-color: #e5e7eb;
            overflow: hidden;
        }
        .similarity-progress-bar {
            height: 100%;
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const API_BASE_URL = 'http://localhost:8000';

        // Error Banner Component
        function ErrorBanner({ message, onClose }) {
            if (!message) return null;
            
            return (
                <div className="error-banner bg-red-50 border-l-4 border-red-400 p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center">
                            <i className="fas fa-exclamation-triangle text-red-400 mr-3"></i>
                            <div>
                                <h3 className="text-sm font-medium text-red-800">Issue with AI Service</h3>
                                <p className="text-sm text-red-700 mt-1">{message}</p>
                            </div>
                        </div>
                        <button
                            onClick={onClose}
                            className="text-red-400 hover:text-red-600"
                        >
                            <i className="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            );
        }

        // Database Status Component (shows read-only status)
        function DatabaseStatus({ databaseStatus }) {
            return (
                <div className="bg-white rounded-lg shadow-sm p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i className="fas fa-database mr-2 text-purple-500"></i>
                        Database Status
                        {databaseStatus?.database_loaded && <span className="ml-2 bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded-full">Ready</span>}
                    </h3>
                    
                    {databaseStatus?.database_loaded ? (
                        <div className="bg-green-50 rounded-lg p-4">
                            <div className="flex items-center">
                                <i className="fas fa-check-circle text-green-500 mr-2"></i>
                                <div>
                                    <p className="text-sm font-medium text-green-800">Database Loaded Successfully</p>
                                    <p className="text-sm text-green-600 mt-1">
                                        {databaseStatus.total_issues} issues available for similarity analysis
                                    </p>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-red-50 rounded-lg p-4">
                            <div className="flex items-center">
                                <i className="fas fa-exclamation-triangle text-red-500 mr-2"></i>
                                <div>
                                    <p className="text-sm font-medium text-red-800">Database Not Loaded</p>
                                    <p className="text-sm text-red-600 mt-1">
                                        Please ensure the feature engineering JSON is in the correct path and restart the backend
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Issue Processing Component
        function IssueProcessor({ onProcessIssue, isLoading, isDatabaseLoaded }) {
            const [isDragOver, setIsDragOver] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragOver(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragOver(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragOver(false);
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                }
            };

            const handleFileSelect = (file) => {
                if (file && file.type === 'application/json') {
                    setSelectedFile(file);
                } else {
                    alert('Please select a valid JSON file');
                }
            };

            const handleProcess = () => {
                if (selectedFile) {
                    onProcessIssue(selectedFile);
                    setSelectedFile(null);
                }
            };

            return (
                <div className="bg-white rounded-lg shadow-sm p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i className="fas fa-cogs mr-2 text-green-500"></i>
                        Analyze Single Issue
                        {!isDatabaseLoaded && <span className="ml-2 bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded-full">DB Required</span>}
                    </h3>
                    
                    <p className="text-sm text-gray-600 mb-4">
                        Upload a single issue JSON file for comprehensive analysis including summary, classification, and similar issue detection.
                    </p>
                    
                    <div
                        className={`file-drop-zone rounded-lg p-8 text-center ${isDragOver ? 'drag-over' : ''} ${!isDatabaseLoaded ? 'opacity-50' : ''}`}
                        onDragOver={isDatabaseLoaded ? handleDragOver : undefined}
                        onDragLeave={isDatabaseLoaded ? handleDragLeave : undefined}
                        onDrop={isDatabaseLoaded ? handleDrop : undefined}
                    >
                        <i className="fas fa-file-alt text-4xl text-gray-400 mb-4"></i>
                        <p className="text-gray-600 mb-2">Drop your issue JSON file here</p>
                        <p className="text-sm text-gray-500 mb-4">or click to select a file</p>
                        
                        <input
                            type="file"
                            accept=".json"
                            onChange={(e) => handleFileSelect(e.target.files[0])}
                            className="hidden"
                            id="issue-file-input"
                            disabled={!isDatabaseLoaded}
                        />
                        <label
                            htmlFor="issue-file-input"
                            className={`inline-block px-4 py-2 rounded-lg cursor-pointer transition-colors ${
                                isDatabaseLoaded 
                                    ? 'bg-green-500 hover:bg-green-600 text-white' 
                                    : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                            }`}
                        >
                            Choose Issue File
                        </label>
                    </div>

                    {selectedFile && (
                        <div className="mt-4 p-4 bg-gray-50 rounded-lg">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center">
                                    <i className="fas fa-file-code text-green-500 mr-2"></i>
                                    <span className="text-sm text-gray-700">{selectedFile.name}</span>
                                    <span className="text-xs text-gray-500 ml-2">
                                        ({(selectedFile.size / 1024).toFixed(1)} KB)
                                    </span>
                                </div>
                                <button
                                    onClick={() => setSelectedFile(null)}
                                    className="text-red-500 hover:text-red-700"
                                >
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    <button
                        onClick={handleProcess}
                        disabled={!selectedFile || isLoading || !isDatabaseLoaded}
                        className="w-full mt-4 bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white py-2 px-4 rounded-lg font-medium transition-colors flex items-center justify-center"
                    >
                        {isLoading ? (
                            <>
                                <div className="loading-spinner mr-2"></div>
                                Processing Issue...
                            </>
                        ) : (
                            <>
                                <i className="fas fa-search mr-2"></i>
                                Analyze Issue
                            </>
                        )}
                    </button>
                </div>
            );
        }

        // Similar Issues Component
        function SimilarIssues({ similarIssues }) {
            if (!similarIssues || similarIssues.length === 0) return null;

            const getSimilarityColor = (score) => {
                if (score >= 0.7) return 'text-green-600';
                if (score >= 0.5) return 'text-yellow-600';
                return 'text-red-600';
            };

            const getSimilarityBg = (score) => {
                if (score >= 0.7) return 'bg-green-100';
                if (score >= 0.5) return 'bg-yellow-100';
                return 'bg-red-100';
            };

            return (
                <div className="bg-white rounded-lg shadow-sm p-6 mt-6">
                    <div className="flex items-center mb-6">
                        <i className="fas fa-project-diagram mr-2 text-blue-500"></i>
                        <h3 className="text-lg font-semibold text-gray-900">Similar Issues Found</h3>
                        <span className="ml-2 bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">
                            {similarIssues.length} matches
                        </span>
                    </div>

                    <div className="space-y-6">
                        {similarIssues.map((issue, index) => (
                            <div key={index} className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                                {/* Header with similarity score */}
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center">
                                        <span className="text-sm font-medium text-gray-500 mr-2">#{index + 1}</span>
                                        <span className={`px-2 py-1 rounded-full text-xs font-medium ${getSimilarityBg(issue.similarity_score)} ${getSimilarityColor(issue.similarity_score)}`}>
                                            {(issue.similarity_score * 100).toFixed(1)}% Match
                                        </span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">
                                            {issue.sector}
                                        </span>
                                        <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">
                                            {issue.issue_category}
                                        </span>
                                    </div>
                                </div>

                                {/* Similarity progress bar */}
                                <div className="similarity-progress mb-3">
                                    <div 
                                        className="similarity-progress-bar"
                                        style={{ width: `${issue.similarity_score * 100}%` }}
                                    ></div>
                                </div>

                                {/* Issue title */}
                                <h4 className="font-medium text-gray-900 mb-2">{issue.title}</h4>

                                {/* Issue details */}
                                <div className="grid grid-cols-2 gap-4 mb-3 text-sm">
                                    <div>
                                        <span className="text-gray-500">Issue Type:</span>
                                        <span className="ml-2 text-gray-700">{issue.manual_issue_type}</span>
                                    </div>
                                    <div>
                                        <span className="text-gray-500">Resolution Strategy:</span>
                                        <span className="ml-2 text-gray-700">{issue.resolution_strategy}</span>
                                    </div>
                                </div>

                                {/* Similarity reasons */}
                                {issue.similarity_reasons && issue.similarity_reasons.length > 0 && (
                                    <div className="mb-3">
                                        <p className="text-sm font-medium text-gray-700 mb-1">Key Similarities:</p>
                                        <div className="flex flex-wrap gap-1">
                                            {issue.similarity_reasons.map((reason, idx) => (
                                                <span key={idx} className="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded">
                                                    {reason}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* LLM Analysis */}
                                <div className="bg-gray-50 rounded-lg p-3">
                                    <div className="flex items-center mb-2">
                                        <i className="fas fa-brain text-purple-500 mr-1"></i>
                                        <span className="text-sm font-medium text-gray-700">AI Analysis</span>
                                    </div>
                                    <p className="text-sm text-gray-600 leading-relaxed">{issue.llm_analysis}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Enhanced Results Display Component
        function EnhancedResultsDisplay({ results, onClear }) {
            if (!results) return null;

            const getClassificationColor = (classification) => {
                const colors = {
                    'LAND & ACQUISITION ISSUES': 'bg-red-100 text-red-800',
                    'REGULATORY APPROVALS & PERMISSIONS': 'bg-yellow-100 text-yellow-800',
                    'UTILITY & INFRASTRUCTURE COORDINATION': 'bg-blue-100 text-blue-800',
                    'ROADS & CONNECTIVITY': 'bg-green-100 text-green-800',
                    'CONSTRUCTION & EXECUTION DELAYS': 'bg-purple-100 text-purple-800',
                    'FINANCIAL & DISBURSEMENT': 'bg-indigo-100 text-indigo-800',
                    'ENVIRONMENTAL & COMPLIANCE': 'bg-teal-100 text-teal-800',
                    'STAKEHOLDER COORDINATION': 'bg-orange-100 text-orange-800'
                };
                return colors[classification] || 'bg-gray-100 text-gray-800';
            };

            const handleExport = () => {
                const exportData = {
                    timestamp: results.timestamp,
                    processing_time: results.processing_time,
                    short_summary: results.short_summary,
                    detailed_summary: results.detailed_summary,
                    issue_classification: results.issue_classification,
                    similar_issues: results.similar_issues
                };
                
                navigator.clipboard.writeText(JSON.stringify(exportData, null, 2))
                    .then(() => alert('Results copied to clipboard!'))
                    .catch(() => alert('Failed to copy to clipboard'));
            };

            return (
                <div className="space-y-6">
                    {/* Main Analysis Results */}
                    <div className="bg-white rounded-lg shadow-sm p-6">
                        <div className="flex items-center justify-between mb-6">
                            <h3 className="text-lg font-semibold text-gray-900 flex items-center">
                                <i className="fas fa-chart-line mr-2 text-purple-500"></i>
                                Issue Analysis Results
                            </h3>
                            <div className="flex items-center space-x-2">
                                <button
                                    onClick={handleExport}
                                    className="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm flex items-center transition-colors"
                                >
                                    <i className="fas fa-download mr-1"></i>
                                    Export
                                </button>
                                <button
                                    onClick={onClear}
                                    className="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm flex items-center transition-colors"
                                >
                                    <i className="fas fa-trash mr-1"></i>
                                    Clear
                                </button>
                            </div>
                        </div>

                        <div className="space-y-6">
                            {/* Short Summary */}
                            <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                                <div className="flex items-center mb-3">
                                    <i className="fas fa-file-alt text-blue-500 mr-2"></i>
                                    <h4 className="font-semibold text-gray-900">Short Summary</h4>
                                    <span className="ml-2 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">2-3 line overview</span>
                                </div>
                                <p className="text-gray-700 leading-relaxed">{results.short_summary}</p>
                            </div>

                            {/* Detailed Summary */}
                            <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                                <div className="flex items-center mb-3">
                                    <i className="fas fa-file-text text-green-500 mr-2"></i>
                                    <h4 className="font-semibold text-gray-900">Detailed Summary</h4>
                                    <span className="ml-2 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">Comprehensive overview</span>
                                </div>
                                <p className="text-gray-700 leading-relaxed">{results.detailed_summary}</p>
                            </div>

                            {/* Issue Classification */}
                            <div className="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                                <div className="flex items-center mb-3">
                                    <i className="fas fa-tags text-purple-500 mr-2"></i>
                                    <h4 className="font-semibold text-gray-900">Project Issue Classification</h4>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className={`px-3 py-1 rounded-full text-sm font-medium ${getClassificationColor(results.issue_classification)}`}>
                                        {results.issue_classification}
                                    </span>
                                    <div className="text-sm text-gray-500 flex items-center">
                                        <i className="fas fa-clock mr-1"></i>
                                        Processed in {results.processing_time?.toFixed(2)}s
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Similar Issues Section */}
                    <SimilarIssues similarIssues={results.similar_issues} />
                </div>
            );
        }

        // Main App component
        function App() {
            const [results, setResults] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState('');
            const [databaseStatus, setDatabaseStatus] = useState(null);

            // Check database status on component mount
            React.useEffect(() => {
                checkDatabaseStatus();
            }, []);

            const checkDatabaseStatus = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/database-status`);
                    if (response.ok) {
                        const status = await response.json();
                        setDatabaseStatus(status);
                    }
                } catch (error) {
                    console.error('Failed to check database status:', error);
                }
            };

            const handleApiError = (error) => {
                let userFriendlyMessage = '';
                
                if (error.message.includes('AI service is not working') || 
                    error.message.includes('API is not responding') ||
                    error.message.includes('Unable to connect to AI service') ||
                    error.message.includes('AI service is temporarily unavailable') ||
                    error.message.includes('AI service authentication failed') ||
                    error.message.includes('AI service is busy') ||
                    error.message.includes('Invalid response from AI service')) {
                    userFriendlyMessage = error.message;
                } else if (error.message.includes('fetch') || error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                    userFriendlyMessage = 'Unable to connect to the backend server. Please make sure the backend is running on http://localhost:8000';
                } else {
                    userFriendlyMessage = 'AI service is not working. Please try again later.';
                }
                
                setErrorMessage(userFriendlyMessage);
                setTimeout(() => setErrorMessage(''), 15000);
            };

            const handleIssueProcessing = async (file) => {
                setIsLoading(true);
                setErrorMessage('');
                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`${API_BASE_URL}/process-issue`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || 'Processing failed');
                    }

                    const result = await response.json();
                    setResults(result);
                } catch (error) {
                    console.error('Issue processing error:', error);
                    handleApiError(error);
                } finally {
                    setIsLoading(false);
                }
            };

            const clearResults = () => {
                setResults(null);
            };

            const clearError = () => {
                setErrorMessage('');
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="gradient-bg text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center">
                                    <i className="fas fa-project-diagram text-2xl mr-3"></i>
                                    <div>
                                        <h1 className="text-2xl font-bold">Gati Shakti Enhanced</h1>
                                        <p className="text-blue-100">Project Issue Analyzer with RAG-based Similar Issues</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <div className="text-right">
                                        <p className="text-sm opacity-90">RAG Enabled</p>
                                        <p className="text-lg font-semibold">v2.0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Error Banner */}
                        <ErrorBanner message={errorMessage} onClose={clearError} />

                        {/* Step-by-step Process */}
                        <div className="mb-8">
                            <div className="flex items-center justify-center space-x-8">
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium ${databaseStatus?.database_loaded ? 'bg-green-500 text-white' : 'bg-gray-300 text-gray-600'}`}>
                                        1
                                    </div>
                                    <span className="ml-2 text-sm text-gray-600">Database Ready</span>
                                </div>
                                <div className={`h-px w-16 ${databaseStatus?.database_loaded ? 'bg-green-500' : 'bg-gray-300'}`}></div>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium ${results ? 'bg-green-500 text-white' : 'bg-gray-300 text-gray-600'}`}>
                                        2
                                    </div>
                                    <span className="ml-2 text-sm text-gray-600">Upload Issue</span>
                                </div>
                                <div className={`h-px w-16 ${results ? 'bg-green-500' : 'bg-gray-300'}`}></div>
                                <div className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium ${results ? 'bg-green-500 text-white' : 'bg-gray-300 text-gray-600'}`}>
                                        3
                                    </div>
                                    <span className="ml-2 text-sm text-gray-600">View Analysis</span>
                                </div>
                            </div>
                        </div>

                        {/* Input Methods */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <DatabaseStatus databaseStatus={databaseStatus} />
                            <IssueProcessor 
                                onProcessIssue={handleIssueProcessing} 
                                isLoading={isLoading} 
                                isDatabaseLoaded={databaseStatus?.database_loaded || false}
                            />
                        </div>

                        {/* Results */}
                        {results && (
                            <EnhancedResultsDisplay results={results} onClear={clearResults} />
                        )}

                        {/* Footer */}
                        <footer className="mt-12 text-center text-gray-500 text-sm">
                            <p>© 2025 Gati Shakti Enhanced Issue Analyzer</p>
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
